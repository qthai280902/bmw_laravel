name: Verify & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      APP_DEBUG: false
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      AI_ASSISTANT_ENABLED: true
      AI_ASSISTANT_PROVIDER: gemini
      AI_ASSISTANT_MODEL: gemini-2.5-flash
      GEMINI_API_KEY: ""
      GEMINI_API_KEYS: ""
      GEMINI_KEY_COOLDOWN_SECONDS: 120
      GEMINI_KEY_ROTATION: round_robin

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, curl, libxml, mysql, pdo_sqlite, bcmath, xml, ctype, json, tokenizer, openssl, pdo, fileinfo, zip, intl, gd, sodium
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          npm ci

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Create SQLite Database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Generate key
        run: php artisan key:generate

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Clear and Cache Config
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Compile Assets
        run: npm run build

      - name: Execute tests
        run: php artisan test
